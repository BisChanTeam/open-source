<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>БисЧан — Панель управления</title>

  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://biscdn.ru/bischan/js/theme.js" defer></script>
  <script src="https://biscdn.ru/bischan/js/admin.js"></script>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" type="button" aria-live="polite">
    <span class="theme-icon" aria-hidden="true"></span>
    <span class="theme-label">Тёмная тема</span>
  </button>

  <div class="panel" style="padding-top:40px">
    <div class="login-card admin-shell">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
        <div>
          <h2 style="margin:0;">Панель управления БисЧан</h2>
          <p class="muted" style="margin:4px 0 0 0;">Просмотр пользователей и управление ими через административную панель.</p>
        </div>
        <a href="/" class="link">Вернуться на сайт</a>
      </div>
      <div id="admin-status" class="muted">Загрузка пользователей...</div>
      <div id="users"></div>
    </div>
  </div>
</body>
</html>
